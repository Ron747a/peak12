<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PEAK/12">
<meta name="theme-color" content="#0a0d12">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>PEAK/12 — 12-Week Program</title>
<style>
  :root{
    --bg:#0a0d12; --card:#11161e; --card2:#161c26; --line:#212a37;
    --text:#e9eef4; --mut:#8d99a8; --dim:#5b6775;
    --acc:#a3e635; --accdim:rgba(163,230,53,.12);
    --blue:#38bdf8; --bluedim:rgba(56,189,248,.12);
    --amber:#fbbf24; --amberdim:rgba(251,191,36,.12);
    --red:#f87171; --reddim:rgba(248,113,113,.10);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    font-size:15px; line-height:1.45;
    padding-bottom:calc(84px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 14px}

  /* header */
  header{
    position:sticky;top:0;z-index:50;
    background:rgba(10,13,18,.86);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);
    padding-top:env(safe-area-inset-top);
  }
  .hrow{display:flex;align-items:center;justify-content:space-between;padding:12px 0 10px}
  .brand{font-weight:800;font-size:17px;letter-spacing:.06em}
  .brand span{color:var(--acc)}
  .phasechip{font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    padding:5px 10px;border-radius:99px;background:var(--accdim);color:var(--acc)}
  .phasechip.p2{background:var(--bluedim);color:var(--blue)}
  .phasechip.p3{background:var(--amberdim);color:var(--amber)}
  .phasechip.p4{background:var(--reddim);color:var(--red)}

  /* date nav */
  .datenav{display:flex;align-items:center;gap:8px;padding:10px 0 12px}
  .datenav button.arrow{
    width:38px;height:38px;border-radius:12px;border:1px solid var(--line);
    background:var(--card);color:var(--text);font-size:18px;flex:none;cursor:pointer;
  }
  .datebox{flex:1;text-align:center}
  .datebox .d1{font-weight:700;font-size:15.5px}
  .datebox .d2{font-size:12px;color:var(--mut);margin-top:1px}
  .todaybtn{
    flex:none;border:none;background:var(--acc);color:#0a0d12;font-weight:700;font-size:12.5px;
    padding:8px 12px;border-radius:10px;cursor:pointer;
  }
  .todaybtn.hidden{display:none}

  /* progress */
  .prog{height:4px;border-radius:99px;background:var(--line);overflow:hidden;margin-bottom:4px}
  .prog i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),#65d94a);border-radius:99px}
  .proglabel{font-size:11px;color:var(--dim);text-align:right;padding-bottom:10px}

  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:14px}
  .card h2{font-size:12px;letter-spacing:.09em;text-transform:uppercase;color:var(--mut);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .card h2 .ic{font-size:14px}
  .card h3{font-size:16.5px;font-weight:800;margin-bottom:2px}
  .sub{color:var(--mut);font-size:13px}

  .banner{border-radius:16px;padding:14px 16px;margin-top:14px;font-size:13.5px;line-height:1.5}
  .banner b{display:block;font-size:14px;margin-bottom:3px}
  .banner.amber{background:var(--amberdim);border:1px solid rgba(251,191,36,.35);color:#fde68a}
  .banner.red{background:var(--reddim);border:1px solid rgba(248,113,113,.35);color:#fecaca}
  .banner.green{background:var(--accdim);border:1px solid rgba(163,230,53,.3);color:#d9f99d}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);text-align:left;font-weight:700;padding:6px 0}
  th:last-child,td:last-child{text-align:right;white-space:nowrap}
  td{padding:9px 0;border-top:1px solid var(--line)}
  td:last-child{color:var(--mut);font-variant-numeric:tabular-nums}

  /* checkable rows */
  .chk{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-top:1px solid var(--line);cursor:pointer}
  .chk:first-of-type{border-top:none;padding-top:2px}
  .box{flex:none;width:22px;height:22px;border-radius:7px;border:1.5px solid #334051;margin-top:2px;
    display:flex;align-items:center;justify-content:center;font-size:13px;color:#0a0d12;transition:all .15s}
  .chk.on .box{background:var(--acc);border-color:var(--acc)}
  .chk.on .box::after{content:"✓";font-weight:800}
  .chk .body{flex:1}
  .chk.on .body{opacity:.45}
  .chk .t{font-weight:700;font-size:14.5px}
  .chk .s{color:var(--mut);font-size:13px;margin-top:1px}
  .chk .s b{color:var(--text);font-weight:700}
  .chk .m{font-size:11.5px;color:var(--dim);margin-top:3px;font-variant-numeric:tabular-nums}
  .tag{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    padding:2px 7px;border-radius:6px;background:var(--card2);border:1px solid var(--line);color:var(--mut);margin-left:6px;vertical-align:1px}

  .totals{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
  .totals .cell{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:9px 6px;text-align:center}
  .totals .v{font-weight:800;font-size:15px;font-variant-numeric:tabular-nums}
  .totals .k{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--dim);margin-top:1px}
  .totals .k.mck{text-transform:none;letter-spacing:0;font-variant-numeric:tabular-nums}
  .targetline{font-size:12px;color:var(--dim);margin-top:9px;line-height:1.5}

  .note{font-size:12.5px;color:var(--mut);margin-top:10px;line-height:1.5;border-top:1px solid var(--line);padding-top:10px}

  details{margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
  details summary{font-size:13px;font-weight:700;color:var(--blue);cursor:pointer;list-style:none}
  details summary::-webkit-details-marker{display:none}
  details summary::after{content:" +";color:var(--dim)}
  details[open] summary::after{content:" –"}
  details .inner{padding-top:8px;font-size:13px;color:var(--mut);line-height:1.55}
  details .inner li{margin:5px 0 5px 16px}

  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px}
  .stat .v{font-weight:800;font-size:17px}
  .stat .k{font-size:11px;color:var(--mut);margin-top:2px}

  /* weigh-in card (top of day) */
  .weighcard{display:flex;align-items:center;gap:14px}
  .weighcard .wico{flex:none;width:44px;height:44px;border-radius:14px;background:var(--accdim);
    display:flex;align-items:center;justify-content:center;font-size:20px}
  .weighcard .wmain{flex:1}
  .weighcard .wt{font-weight:800;font-size:15px}
  .weighcard .ws{font-size:12px;color:var(--mut);margin-top:1px}
  .winput{display:flex;gap:8px;align-items:center;margin-top:10px}
  .winput input{
    flex:1;max-width:120px;background:var(--card2);border:1px solid var(--line);border-radius:10px;
    color:var(--text);font-size:17px;font-weight:800;padding:9px 10px;text-align:center;
    font-variant-numeric:tabular-nums;-webkit-appearance:none;appearance:none;
  }
  .winput input:focus{outline:none;border-color:var(--acc)}
  .winput .unit{color:var(--dim);font-size:13px;font-weight:700}
  .winput button{
    border:none;background:var(--acc);color:#0a0d12;font-weight:800;font-size:13px;
    padding:10px 16px;border-radius:10px;cursor:pointer;
  }
  .wdeltatag{font-size:12px;font-weight:700;margin-top:7px}

  /* weight view */
  .wstatgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .chartbox{margin-top:12px}
  .chartbox svg{width:100%;height:auto;display:block}
  .wrowline{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid var(--line)}
  .wrowline:first-of-type{border-top:none}
  .wrowline .wd{flex:1;font-size:13.5px;color:var(--mut)}
  .wrowline .wv{font-weight:800;font-size:15px;font-variant-numeric:tabular-nums}
  .wrowline .wdelta{font-size:12px;font-weight:700;width:56px;text-align:right;font-variant-numeric:tabular-nums}
  .wrowline .wdel{border:none;background:none;color:var(--dim);font-size:15px;padding:4px 2px 4px 10px;cursor:pointer}
  .down{color:var(--acc)} .up{color:var(--amber)} .flat{color:var(--dim)}
  .empty{color:var(--dim);font-size:13.5px;text-align:center;padding:22px 8px;line-height:1.6}

  /* tabs */
  nav{
    position:fixed;left:0;right:0;bottom:0;z-index:60;
    background:rgba(10,13,18,.9);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    padding:8px 0 calc(8px + env(safe-area-inset-bottom));
  }
  .navrow{max-width:560px;margin:0 auto;display:flex}
  .navrow button{
    flex:1;background:none;border:none;color:var(--dim);font-size:11px;font-weight:700;
    display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;letter-spacing:.03em
  }
  .navrow button .nic{font-size:20px;line-height:1}
  .navrow button.active{color:var(--acc)}

  .phaseblock{margin-top:14px;border-left:3px solid var(--line);padding-left:14px}
  .phaseblock.active{border-left-color:var(--acc)}
  .phaseblock .pt{font-weight:800;font-size:15px}
  .phaseblock .pd{font-size:12.5px;color:var(--mut);margin:2px 0 6px}
  .phaseblock ul{list-style:none}
  .phaseblock li{font-size:13px;color:var(--mut);margin:4px 0;padding-left:14px;position:relative}
  .phaseblock li::before{content:"·";position:absolute;left:2px;color:var(--acc);font-weight:800}
  .nowtag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.06em;background:var(--acc);color:#0a0d12;padding:2px 7px;border-radius:6px;margin-left:7px;vertical-align:1px}

  /* set logging */
  .exrow{padding:10px 0;border-top:1px solid var(--line)}
  .exrow:first-child{border-top:none;padding-top:4px}
  .exhead{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .exname{font-weight:700;font-size:14.5px}
  .extarget{color:var(--mut);font-size:13px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .exlog{display:flex;align-items:center;gap:7px;margin-top:7px}
  .exlog input{width:64px;background:var(--card2);border:1px solid var(--line);border-radius:9px;color:var(--text);
    font-size:15px;font-weight:700;padding:7px 6px;text-align:center;font-variant-numeric:tabular-nums;-webkit-appearance:none;appearance:none}
  .exlog input:focus{outline:none;border-color:var(--acc)}
  .exlog .lx{color:var(--dim);font-size:12px;white-space:nowrap}
  .lastref{flex:1;text-align:right;font-size:11.5px;color:var(--dim);line-height:1.3}
  .lastref.beat{color:var(--acc);font-weight:700}
  .lastref.dim{opacity:.7}

  .bigday{font-size:26px;font-weight:800;letter-spacing:-.01em}
  .countnum{font-size:44px;font-weight:800;color:var(--acc);line-height:1.1}
  .center{text-align:center;padding:26px 16px}

  .hide{display:none}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="hrow">
      <div class="brand">PEAK<span>/12</span></div>
      <div class="phasechip" id="phaseChip">—</div>
    </div>
    <div class="datenav" id="dateNav">
      <button class="arrow" id="prevBtn" aria-label="Previous day">‹</button>
      <div class="datebox">
        <div class="d1" id="dateTitle">—</div>
        <div class="d2" id="dateSub">—</div>
      </div>
      <button class="arrow" id="nextBtn" aria-label="Next day">›</button>
      <button class="todaybtn hidden" id="todayBtn">Today</button>
    </div>
    <div class="prog" id="progWrap"><i id="progBar" style="width:0%"></i></div>
    <div class="proglabel" id="progLabel"></div>
  </div>
</header>

<main class="wrap">
  <div id="todayView"></div>
  <div id="weightView" class="hide"></div>
  <div id="planView" class="hide"></div>
</main>

<nav>
  <div class="navrow">
    <button id="tabToday" class="active"><span class="nic">◉</span>Today</button>
    <button id="tabWeight"><span class="nic">↘</span>Weight</button>
    <button id="tabPlan"><span class="nic">☰</span>Full Plan</button>
  </div>
</nav>

<script>
"use strict";

/* ============ PROGRAM CONSTANTS ============ */

const START = {y:2026, m:7, d:13};           // Day 1 — Mon 13 July 2026
const DOCW0 = {y:2026, m:7, d:13};           // Mon 13 July — anchor for week numbering (Mon-aligned)
const EVENTMON = {y:2026, m:9, d:28};        // Mon 28 Sep — event week begins
const TOTAL_DAYS = 83;                        // Mon 13 Jul → Sat 3 Oct (event day)
const DELOAD_WEEKS = [4, 8];
const LIFT_DOWS = [1,2,4,5];                  // Mon, Tue, Thu, Fri
const DOW = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MON = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

/* ---- Training: Upper/Lower ×2 ---- */
const SESSIONS = {
  1:{name:"Upper A", focus:"Chest · Back · Shoulders · Arms", ex:[
    ["Chest Press","3 × 6–8"],["Back Row","3 × 8–10"],["Shoulder Press","3 × 8–10"],
    ["Back Pulldown","3 × 10–12"],["Shoulder Raise","2 × 15"],
    ["Bicep Curl","2 × 10"],["Tricep Extension","2 × 12"]]},
  2:{name:"Lower A", focus:"Quads · Hams · Glutes · Calves", ex:[
    ["Quad Squat","3 × 6–8"],["Hamstring Hinge","3 × 10"],["Quad Press","3 × 12"],
    ["Hamstring Curl","2 × 12"],["Glute Lunge","2 × 12/leg"],["Calf Raise","3 × 15"]]},
  4:{name:"Upper B", focus:"Chest · Back · Shoulders · Arms", ex:[
    ["Chest Press","3 × 8–10"],["Back Pulldown","3 × 8–10"],["Shoulder Press","3 × 10"],
    ["Back Row","3 × 10–12"],["Shoulder Fly (rear delt)","2 × 15"],
    ["Bicep Curl","2 × 12"],["Tricep Extension","2 × 12"]]},
  5:{name:"Lower B", focus:"Quads · Hams · Glutes · Calves", ex:[
    ["Quad Squat","3 × 8–10"],["Hamstring Hinge","3 × 10"],["Quad Extension","2 × 15"],
    ["Hamstring Curl","2 × 12"],["Glute Lunge","2 × 10/leg"],["Calf Raise","3 × 15"]]},
};
const SESSION_NOTE = "2–3 sets per exercise, max — lower volume, higher quality. Make every set count.";

const PHASES = {
  p1:{chip:"Phase 1 · Recomp", cls:"", title:"Phase 1 — Recomp", range:"Weeks 1–6 · Mon 13 Jul → Sun 23 Aug",
      water:"3.5–4 L", sodium:"Normal — salt food to taste",
      waterNote:"No restriction needed — the deficit is small this phase.",
      cardio:{2:"LISS · 25–30 min",4:"LISS · 25–30 min",0:"LISS · 25–30 min"}},
  p2:{chip:"Phase 2 · Tighten", cls:"p2", title:"Phase 2 — Tighten", range:"Weeks 7–10 · Mon 24 Aug → Sun 20 Sep",
      water:"4–4.5 L", sodium:"Normal to slightly higher",
      waterNote:"Higher cardio volume means more sweat loss — don't under-salt.",
      cardio:{1:"HIIT · 10 rounds — 30 s hard / 90 s easy",2:"LISS · 30 min",3:"LISS · 30 min",4:"LISS · 30 min",0:"LISS · 30 min"}},
  p3:{chip:"Phase 3 · Sharpen", cls:"p3", title:"Phase 3 — Sharpen", range:"Week 11 · Mon 21 Sep → Sun 27 Sep",
      water:"4–4.5 L", sodium:"Normal — keep it consistent",
      waterNote:"Consistency matters more than amount here — no manipulating water or salt yet, that's event week only.",
      cardio:{1:"HIIT · 10 rounds — 30 s hard / 90 s easy",2:"LISS · 30–35 min",3:"LISS · 30–35 min",4:"LISS · 30–35 min",6:"LISS · 30–35 min",0:"LISS · 30–35 min"}},
  p4:{chip:"Event Week", cls:"p4", title:"Event Week", range:"Week 12 · Mon 28 Sep → Sat 3 Oct",
      water:"", sodium:"", waterNote:"", cardio:{}},
};

/* ============ NUTRITION (composed from food data — sums always add up) ============ */
const N = {
  m1:     {k:438,p:48,  c:31, f:15},    // 250g full-fat Greek yoghurt + whey + 150g berries
  pt:     {k:470,p:13,  c:104,f:2},     // 2 bananas + 2 slices sourdough
  m4:     {k:483,p:68,  c:3,  f:16.5},  // 180g chicken + 2 eggs + veg
  chicken:{k:360,p:62,  c:2,  f:7},     // 200g chicken breast + veg
  beef:   {k:459,p:53,  c:2,  f:23},    // 200g lean beef mince + veg
  fish:   {k:250,p:46,  c:2,  f:3},     // 200g white fish + veg
  salmon: {k:444,p:43,  c:2,  f:24.5},  // 200g salmon + veg
  smoked: {k:264,p:35,  c:2,  f:7.5},   // 200g smoked salmon + veg
  banana: {k:105,p:1.2, c:27, f:0.3},   // each
  whey:   {k:120,p:24,  c:3,  f:1.5},   // 1 scoop in water
  honey:  {k:30, p:0,   c:8,  f:0},     // drizzle (~10g)
};
const riceN = g => ({k:1.3*g, p:0.028*g, c:0.28*g, f:0.003*g});
const spN   = g => ({k:0.9*g, p:0.021*g, c:0.21*g, f:0.0025*g});
const sum = (...xs) => xs.reduce((a,x)=>({k:a.k+x.k,p:a.p+x.p,c:a.c+x.c,f:a.f+x.f}),{k:0,p:0,c:0,f:0});
const meal = (name, detail, ...parts) => { const s=sum(...parts); return [name, detail, s.k, s.p, s.c, s.f]; };

const PROT_LABEL = {chicken:"200g chicken breast", beef:"200g lean beef mince", fish:"200g white fish",
                    salmon:"200g salmon", smoked:"200g smoked salmon"};
const M2_ROT = {1:"chicken",2:"beef",3:"chicken",4:"beef",5:"chicken",6:"beef",0:"beef"};
const M3_ROT = {1:"salmon",2:"fish",3:"smoked",4:"fish",5:"salmon",6:"fish"};   // Sunday handled per phase
const CARBS = { p1:{tr:[282,376], re:[218,291]}, p2:{tr:[140,186], re:[111,148]}, p3:{tr:[68,91], re:[75,100]} };

const M1_MEAL = meal("Meal 1 — Breakfast","250g full-fat Greek yoghurt + 1 scoop whey + 150g frozen berries", N.m1);
const M4_MEAL = meal("Meal 4 — Dinner","180g chicken breast + 2 whole eggs + veg", N.m4);

function mealsFor(pk, dow){
  const rest = !LIFT_DOWS.includes(dow);            // Wed, Sat, Sun — every non-lifting day eats rest-day amounts
  const [rice, sp] = CARBS[pk][rest?"re":"tr"];
  const m2p = M2_ROT[dow];
  const m3p = dow===0 ? (pk==="p1"?"salmon":"fish") : M3_ROT[dow];
  const out = [M1_MEAL];
  if(!rest){
    out.push(meal("Pre-Training Meal","<b>2 bananas + 2 slices sourdough</b> — eat 60–90 min before your session", N.pt));
  }
  out.push(meal("Meal 2 — Lunch",`${PROT_LABEL[m2p]} + <b>${rice}g cooked rice</b> + veg`, N[m2p], riceN(rice)));
  out.push(meal("Meal 3 — Dinner Prep",`${PROT_LABEL[m3p]} + <b>${sp}g cooked sweet potato</b> + veg`, N[m3p], spN(sp)));
  out.push(M4_MEAL);
  return out;
}
const TARGETS = {
  p1:{tr:"~2,750 kcal · 300g carbs", re:"~2,450 kcal · 160g carbs"},
  p2:{tr:"~2,400 kcal · 220g carbs", re:"~2,050 kcal · 100g carbs"},
  p3:{tr:"~2,200 kcal · 180g carbs", re:"~1,900 kcal · 80g carbs"},
};

/* ---- Event week: full day-by-day plans (new foods, new split, protocol baked in) ---- */
const depEx = n => SESSIONS[n].ex.map(([e,s]) => [e, s.split("×")[0].trim()+" × 15–20"]);
const lowMeals = dow => {                       // depletion days: weekly rotation at Phase-2 rest-day carbs (~100g C)
  const m2p=M2_ROT[dow], m3p=M3_ROT[dow];
  return [M1_MEAL,
    meal("Meal 2 — Lunch",`${PROT_LABEL[m2p]} + <b>111g cooked rice</b> + veg`, N[m2p], riceN(111)),
    meal("Meal 3 — Afternoon",`${PROT_LABEL[m3p]} + <b>148g cooked sweet potato</b> + veg`, N[m3p], spN(148)),
    M4_MEAL];
};
const EVENT_WEEK = [
  { d:"Day −5", tag:"Deplete",
    banner:"Draining muscle glycogen through low carbs and high-rep volume. Follow today exactly — don't freelance extras.",
    session:{name:"Upper A — Depletion", focus:SESSIONS[1].focus, ex:depEx(1),
      note:"Load: 70–80% of your normal weights (drop 20–30%). High reps, controlled — you're draining glycogen, not chasing strength."},
    cardio:"Light walk · 20–30 min easy",
    meals:lowMeals(1),
    mealNote:"~100g carbs — deliberately low to draw down glycogen. Protein stays high. No banana/sourdough meal this week until the load.",
    water:"4–4.5 L — stay high", sodium:"Normal — don't restrict yet" },

  { d:"Day −4", tag:"Deplete",

/* ============ DATE HELPERS ============ */
const dayMS = 86400000;
const utc = (y,m,d)=>Date.UTC(y,m-1,d);
const startUTC = utc(START.y,START.m,START.d);
const docw0UTC = utc(DOCW0.y,DOCW0.m,DOCW0.d);
const evmonUTC = utc(EVENTMON.y,EVENTMON.m,EVENTMON.d);
const dUTC = dt => utc(dt.getFullYear(),dt.getMonth()+1,dt.getDate());
function dayIndex(dt){ return Math.round((dUTC(dt) - startUTC)/dayMS); }                 // 0 = day 1 (Thu 9 Jul)
function weekOf(dt){ return Math.max(1, Math.floor((dUTC(dt) - docw0UTC)/dayMS/7)+1); }  // Mon-aligned program weeks
function eventIdx(dt){ return Math.round((dUTC(dt) - evmonUTC)/dayMS); }                 // 0 = Mon 28 Sep
function fmt(dt){ return `${DOW[dt.getDay()]} ${dt.getDate()} ${MON[dt.getMonth()]}`; }
function fmtShort(dt){ return `${DOW[dt.getDay()].slice(0,3)} ${dt.getDate()} ${MON[dt.getMonth()]}`; }
function iso(dt){ return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`; }
function fromIso(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function phaseKeyForWeek(w){ return w<=6 ? "p1" : w<=10 ? "p2" : w===11 ? "p3" : "p4"; }

/* ============ STATE / STORAGE ============ */
let viewDate = new Date();
function getChecks(dt){ try{ return JSON.parse(localStorage.getItem("p12-"+iso(dt))||"[]"); }catch(e){ return []; } }
function setCheck(dt,id,on){
  const k = "p12-"+iso(dt); let a = getChecks(dt);
  if(on && !a.includes(id)) a.push(id);
  if(!on) a = a.filter(x=>x!==id);
  localStorage.setItem(k, JSON.stringify(a));
}
function getWeights(){ try{ return JSON.parse(localStorage.getItem("p12-weights")||"{}"); }catch(e){ return {}; } }
function saveWeight(dateIso, v){
  const w = getWeights();
  if(v==null) delete w[dateIso]; else w[dateIso]=v;
  localStorage.setItem("p12-weights", JSON.stringify(w));
}
/* lift logs: { "2026-07-13": { s:"Upper A", ex:{ "Chest Press":{w:80,r:8}, ... } }, ... } */
function getLifts(){ try{ return JSON.parse(localStorage.getItem("p12-lifts")||"{}"); }catch(e){ return {}; } }
function saveLiftEntry(dateIso, session, ex, w, r){
  const L = getLifts();
  if(w==null && r==null){
    if(L[dateIso]){ delete L[dateIso].ex[ex]; if(!Object.keys(L[dateIso].ex).length) delete L[dateIso]; }
  } else {
    L[dateIso] = L[dateIso] || {s:session, ex:{}};
    L[dateIso].s = session;
    L[dateIso].ex[ex] = {w, r};
  }
  localStorage.setItem("p12-lifts", JSON.stringify(L));
}
function lastLift(session, ex, beforeIso){
  const L = getLifts();
  const base = s => (s||"").replace(" — Depletion","");
  const dates = Object.keys(L).filter(d=>d<beforeIso).sort().reverse();
  let any = null;
  for(const d of dates){
    const e = L[d];
    if(!e.ex || !e.ex[ex]) continue;
    if(base(e.s)===base(session)) return {...e.ex[ex], session:e.s, date:d, sameSession:true};
    if(!any) any = {...e.ex[ex], session:e.s, date:d, sameSession:false};
  }
  return any;
}
function bindLifts(root){
  const wrap = root.querySelector(".exlist");
  if(!wrap) return;
  const dateIso = iso(viewDate);
  const sName = wrap.dataset.session;
  const stored = getLifts()[dateIso];
  wrap.querySelectorAll(".exrow").forEach(row=>{
    const ex = row.dataset.ex;
    const wIn = row.querySelector(".li-w"), rIn = row.querySelector(".li-r"), ref = row.querySelector(".lastref");
    const cur = stored && stored.ex ? stored.ex[ex] : null;
    if(cur){ if(cur.w!=null) wIn.value = cur.w; if(cur.r!=null) rIn.value = cur.r; }
    const paint = ()=>{
      const last = lastLift(sName, ex, dateIso);
      if(!last){ ref.textContent = "first log"; ref.className = "lastref dim"; return; }
      let txt = `Last: ${last.w!=null?last.w+"kg":"—"} × ${last.r!=null?last.r:"—"}`;
      if(!last.sameSession) txt += ` (${last.session.replace(" — Depletion","")})`;
      let cls = "lastref";
      const nw = parseFloat(wIn.value), nr = parseInt(rIn.value);
      if(last.sameSession && !isNaN(nw) && !isNaN(nr) && last.w!=null && last.r!=null){
        if(nw>last.w || (nw===last.w && nr>last.r)){ txt += "  ▲ beat it"; cls += " beat"; }
        else if(nw===last.w && nr===last.r){ txt += "  = matched"; }
      }
      ref.textContent = txt; ref.className = cls;
    };
    const save = ()=>{
      const w = parseFloat(wIn.value), r = parseInt(rIn.value);
      saveLiftEntry(dateIso, sName, ex, isNaN(w)?null:w, isNaN(r)?null:r);
      paint();
    };
    wIn.addEventListener("change", save);
    rIn.addEventListener("change", save);
    [wIn,rIn].forEach(i=>i.addEventListener("keydown", e=>{ if(e.key==="Enter") i.blur(); }));
    paint();
  });
}

/* ============ RENDER HELPERS ============ */
function chkRow(id, title, sub, meta, checked, tag){
  return `<div class="chk${checked?" on":""}" data-chk="${id}">
    <div class="box"></div>
    <div class="body">
      <div class="t">${title}${tag?`<span class="tag">${tag}</span>`:""}</div>
      ${sub?`<div class="s">${sub}</div>`:""}
      ${meta?`<div class="m">${meta}</div>`:""}
    </div>
  </div>`;
}
function sessionCard(S, opts){
  opts = opts||{};
  let body = "";
  if(S.ex && opts.log){
    body = `<div class="exlist" data-session="${S.name}" style="margin-top:6px">` + S.ex.map(([e,s])=>`
      <div class="exrow" data-ex="${e}">
        <div class="exhead"><span class="exname">${e}</span><span class="extarget">${s}</span></div>
        <div class="exlog">
          <input class="li-w" type="number" inputmode="decimal" step="0.5" min="0" max="500" placeholder="kg">
          <span class="lx">kg ×</span>
          <input class="li-r" type="number" inputmode="numeric" step="1" min="0" max="100" placeholder="reps">
          <span class="lastref"></span>
        </div>
      </div>`).join("") + `</div>`;
  } else if(S.ex){
    const rows = S.ex.map(e=>`<tr><td>${e[0]}</td><td>${e[1]}</td></tr>`).join("");
    body = `<table style="margin-top:10px"><tr><th>Exercise</th><th>Sets × Reps</th></tr>${rows}</table>`;
  }
  return `<div class="card">
    <h2><span class="ic">🏋️</span>Today's session</h2>
    <h3>${S.name}${opts.tag?`<span class="tag" style="color:var(--amber);border-color:rgba(251,191,36,.4)">${opts.tag}</span>`:""}</h3>
    <div class="sub">${S.focus}</div>
    ${body}
    ${S.note?`<div class="note">${S.note}</div>`:""}
    ${opts.extraNote||""}
    ${opts.details||""}
  </div>`;
}
let dayMeals = [];   // meals shown on the current day (feeds the live macro counter)
function mealsCard(meals, checks, heading, footNote, showTotals, details){
  dayMeals = showTotals ? meals : [];
  const rows = meals.map((m,i)=>chkRow("meal"+i, m[0], m[1],
    m[2]?`${Math.round(m[2])} kcal · ${Math.round(m[3])}g P · ${Math.round(m[4])}g C · ${Math.round(m[5])}g F`:"", checks.includes("meal"+i))).join("");
  const tot = meals.reduce((a,m)=>[a[0]+m[2],a[1]+m[3],a[2]+m[4],a[3]+m[5]],[0,0,0,0]);
  const units = [" kcal","g P","g C","g F"];
  const grid = showTotals ? `
    <div class="totals" id="mcGrid">
      ${units.map((u,i)=>`<div class="cell">
        <div class="v mcv" data-mc="${i}">0</div>
        <div class="k mck">/ ${Math.round(tot[i]).toLocaleString()}${u}</div>
      </div>`).join("")}
    </div>
    <div class="targetline" id="mcRemain"></div>` : "";
  return `<div class="card">
    <h2><span class="ic">🍽</span>${heading}</h2>
    ${rows}
    ${grid}
    ${footNote?`<div class="targetline">${footNote}</div>`:""}
    ${details||""}
  </div>`;
}
/* live macro counter — ticked meals count as eaten; shows what's left for the day */
function updateMacroCounter(){
  const grid = document.getElementById("mcGrid");
  if(!grid || !dayMeals.length) return;
  const checks = getChecks(viewDate);
  const eaten = dayMeals.reduce((a,m,i)=>checks.includes("meal"+i)?[a[0]+m[2],a[1]+m[3],a[2]+m[4],a[3]+m[5]]:a,[0,0,0,0]);
  const tot = dayMeals.reduce((a,m)=>[a[0]+m[2],a[1]+m[3],a[2]+m[4],a[3]+m[5]],[0,0,0,0]);
  grid.querySelectorAll("[data-mc]").forEach(n=>{
    const i = +n.dataset.mc, v = Math.round(eaten[i]);
    n.textContent = i===0 ? v.toLocaleString() : v+"g";
    n.style.color = v>0 ? "var(--acc)" : "";
  });
  const left = tot.map((t,i)=>Math.max(0, Math.round(t)-Math.round(eaten[i])));
  const done = dayMeals.every((_,i)=>checks.includes("meal"+i));
  document.getElementById("mcRemain").innerHTML = done
    ? `<b style="color:var(--acc)">All meals done for the day ✓</b>`
    : `Left today: <b style="color:var(--text)">${left[0].toLocaleString()} kcal · ${left[1]}g P · ${left[2]}g C · ${left[3]}g F</b>`;
}
function weighCard(dt){
  const weights = getWeights();
  const w = weights[iso(dt)];
  const logged = w!=null;
  // most recent entry strictly before this date
  const prevKey = Object.keys(weights).filter(k=>k<iso(dt)).sort().pop();
  let deltaHtml = "";
  if(logged && prevKey){
    const d = w - weights[prevKey];
    const cls = d<0?"down":(d>0?"up":"flat");
    const arrow = d<0?"▼":(d>0?"▲":"■");
    deltaHtml = `<div class="wdeltatag ${cls}">${arrow} ${Math.abs(d).toFixed(1)} kg vs last entry (${fmtShort(fromIso(prevKey))})</div>`;
  } else if(!logged && prevKey){
    deltaHtml = `<div class="wdeltatag flat">Last entry: ${weights[prevKey].toFixed(1)} kg — ${fmtShort(fromIso(prevKey))}</div>`;
  }
  return `<div class="card">
    <div class="weighcard">
      <div class="wico">⚖️</div>
      <div class="wmain">
        <div class="wt">Morning weigh-in ${logged?'<span class="tag" style="color:var(--acc);border-color:rgba(163,230,53,.4)">Done</span>':""}</div>
        <div class="ws">First thing, after the bathroom, before food or water</div>
        <div class="winput">
          <input id="wIn" type="number" inputmode="decimal" step="0.1" min="30" max="250" placeholder="0.0" value="${logged?w:""}">
          <span class="unit">kg</span>
          <button id="wSave">${logged?"Update":"Save"}</button>
        </div>
        ${deltaHtml}
      </div>
    </div>
  </div>`;
}
function habitsCard(dt, checks, eventWeek){
  return `<div class="card">
    <h2><span class="ic">✅</span>Daily non-negotiables</h2>
    ${chkRow("h-sleep","Sleep 7.5–9 hours","The single biggest lever for keeping muscle in a deficit","",checks.includes("h-sleep"))}
    ${eventWeek
      ? chkRow("h-steps","Stay lightly active","Easy walking only this week — no HIIT, no long cardio","",checks.includes("h-steps"))
      : chkRow("h-steps","8,000–10,000 steps","Outside of training","",checks.includes("h-steps"))}
    ${dt.getDay()===0?chkRow("h-photos","Weekly photos + waist measurement","Same time of day, same lighting as last week","",checks.includes("h-photos")):""}
  </div>`;
}

/* ============ TODAY VIEW ============ */
function renderToday(){
  const idx = dayIndex(viewDate);
  const el = document.getElementById("todayView");
  const chip = document.getElementById("phaseChip");
  const dow = viewDate.getDay();
  const checks = getChecks(viewDate);

  document.getElementById("dateTitle").textContent = fmt(viewDate);
  const isToday = iso(viewDate)===iso(new Date());
  document.getElementById("todayBtn").classList.toggle("hidden", isToday);

  /* before day 1 */
  if(idx < 0){
    chip.textContent = "PEAK/12"; chip.className = "phasechip";
    document.getElementById("dateSub").textContent = "Program starts Mon 13 July";
    document.getElementById("progBar").style.width = "0%";
    document.getElementById("progLabel").textContent = "";
    el.innerHTML = `
      <div class="card center">
        <div class="sub" style="margin-bottom:6px">Program starts in</div>
        <div class="countnum">${-idx} day${idx===-1?"":"s"}</div>
        <div class="sub" style="margin-top:6px">Monday 13 July → event day Saturday 3 October<br>Day 1: Upper A + full training-day meals</div>
      </div>
      <div class="card">
        <h2><span class="ic">🛒</span>Get ready — week 1 shop</h2>
        ${chkRow("prep-1","Proteins","Chicken breast · lean beef mince · salmon · smoked salmon · white fish · eggs · full-fat Greek yoghurt · whey","",checks.includes("prep-1"))}
        ${chkRow("prep-2","Carbs","White rice · sweet potato · bananas · sourdough · frozen berries","",checks.includes("prep-2"))}
        ${chkRow("prep-3","Extras","Veg for every main meal · electrolyte tabs or salt for training days","",checks.includes("prep-3"))}
        ${chkRow("prep-4","Kitchen scale","Portions are in exact grams — a scale removes all guessing","",checks.includes("prep-4"))}
        ${chkRow("prep-5","Baseline photos + waist measurement","Take them Sunday or Monday morning — you'll want them in week 12","",checks.includes("prep-5"))}
      </div>
      <div class="card">
        <h2><span class="ic">👁</span>Preview</h2>
        <div class="sub">Use the arrows above to browse any day of the program — day 1 is Monday 13 July.</div>
      </div>`;
    bindChecks(el);
    return;
  }

  /* after event */
  if(idx >= TOTAL_DAYS){
    chip.textContent = "Complete"; chip.className = "phasechip";
    document.getElementById("dateSub").textContent = "Program complete";
    document.getElementById("progBar").style.width = "100%";
    document.getElementById("progLabel").textContent = "";
    el.innerHTML = `
      <div class="card center">
        <div style="font-size:40px;margin-bottom:8px">🏆</div>
        <div class="bigday">Done.</div>
        <div class="sub" style="margin-top:8px">Eat normally, drink normally, rest up.<br>Reverse calories up gradually over the next couple of weeks rather than swinging straight into a surplus.</div>
      </div>`;
    return;
  }

  const week = weekOf(viewDate);
  const pk = phaseKeyForWeek(week);
  const P = PHASES[pk];
  const isDeload = DELOAD_WEEKS.includes(week);
  const dayNum = idx+1;

  chip.textContent = P.chip; chip.className = "phasechip "+P.cls;
  document.getElementById("dateSub").textContent = `Week ${week} of 12 · Day ${dayNum} of ${TOTAL_DAYS}`;
  document.getElementById("progBar").style.width = Math.round(dayNum/TOTAL_DAYS*100)+"%";
  document.getElementById("progLabel").textContent = Math.round(dayNum/TOTAL_DAYS*100)+"% complete";

  const parts = [weighCard(viewDate)];   // weigh-in first — see it when you wake up

  /* ---- EVENT WEEK ---- */
  if(pk==="p4"){
    const ei = Math.min(Math.max(eventIdx(viewDate),0),5);
    const E = EVENT_WEEK[ei];
    const isEventDay = ei===5;

    parts.push(isEventDay
      ? `<div class="banner green"><b>🏁 EVENT DAY</b>${E.banner}</div>`
      : `<div class="banner red"><b>Event week — ${E.d} · ${E.tag}</b>${E.banner}</div>`);

    parts.push(sessionCard(E.session, {log: ei<=2}));

    if(E.cardio){
      parts.push(`<div class="card"><h2><span class="ic">🏃</span>Cardio</h2>
        ${chkRow("cardio", E.cardio, "No HIIT, no long cardio this week — walking only.","",checks.includes("cardio"))}
      </div>`);
    }

    parts.push(mealsCard(E.meals, checks, `Meals — ${isEventDay?"event day":E.tag.toLowerCase()}`,
      E.mealNote, !E.noTotals));

    parts.push(`<div class="card">
      <h2><span class="ic">💧</span>Water & sodium</h2>
      <div class="statgrid">
        <div class="stat"><div class="v">Water</div><div class="k">${E.water}</div></div>
        <div class="stat"><div class="v">Sodium</div><div class="k">${E.sodium}</div></div>
      </div>
    </div>`);

    if(E.extra) parts.push(`<div class="card"><h2><span class="ic">⭐</span>Priority</h2><div class="sub" style="color:var(--text)">${E.extra}</div></div>`);

    parts.push(habitsCard(viewDate, checks, true));

    parts.push(`<div class="banner amber"><b>Safety line</b>If you feel genuinely unwell at any point — dizzy, disoriented, racing heart, severe cramping — stop the protocol, drink water normally and eat normally. One day is never worth your health.</div>`);

    el.innerHTML = parts.join("");
    bindChecks(el); bindWeigh(el); bindLifts(el); updateMacroCounter();
    return;
  }

  /* ---- NORMAL WEEKS ---- */
  const lifting = LIFT_DOWS.includes(dow);
  const meals = mealsFor(pk, dow);
  const cardio = P.cardio[dow];

  if(isDeload){
    parts.push(`<div class="banner amber"><b>⚠️ Deload week — non-negotiable</b>
      The session table below already shows the reduced sets — nothing to work out. Just drop to ~70% of your normal weights and stay a few reps short of failure. This protects joints, CNS and hormones — skipping it is how people burn out around week 8–9.</div>`);
  }

  if(lifting){
    const S = isDeload
      ? {...SESSIONS[dow], ex: SESSIONS[dow].ex.map(([e,s])=>{
          const m = s.match(/^(\d+)(\s*×.*)$/);
          return [e, m ? Math.max(1,parseInt(m[1])-1)+m[2] : s];
        })}
      : SESSIONS[dow];
    parts.push(sessionCard(S, {
      log: true,
      tag: isDeload ? "Deload" : "",
      extraNote: isDeload ? `<div class="note" style="color:#fde68a">Sets already reduced for the deload — run everything at ~70% of your usual weights, well short of failure.</div>` : "",
      details: `<details><summary>Effort, rests & progression</summary><div class="inner"><ul>
        <li><b>Volume:</b> ${SESSION_NOTE}</li>
        <li><b>Effort:</b> RPE 8–9 — leave 1–2 reps in the tank on most sets. True failure only on a final set, and only when recovering well.</li>
        <li><b>Rest:</b> 2–3 min on compounds · 60–90 s on isolation.</li>
        <li><b>Progression:</b> beat last week — one more rep at the same weight, or same reps slightly heavier. Log every set.</li>
        <li>If a lift stalls 2+ sessions, that's normal in a deficit — hold the weight and keep the reps clean.</li>
      </ul></div></details>`
    }));
  } else if(dow===0){
    parts.push(`<div class="card">
      <h2><span class="ic">🚶</span>Today's session</h2>
      <h3>Recovery Cardio</h3>
      <div class="sub">No weights — one easy aerobic session to aid recovery (below). Weekly check-in day: waist measurement + progress photos, same time and lighting as last week.</div>
    </div>`);
  } else {
    parts.push(`<div class="card">
      <h2><span class="ic">🛋</span>Today's session</h2>
      <h3>Rest day</h3>
      <div class="sub">${cardio
        ? "Rest from lifting — recovery is the work now. Light cardio only today (below)."
        : "Full rest — no weights, no cardio. Recovery is what makes the training stick."}</div>
    </div>`);
  }

  if(cardio){
    parts.push(`<div class="card">
      <h2><span class="ic">🏃</span>Cardio</h2>
      ${chkRow("cardio", cardio, cardio.startsWith("HIIT")
        ? "Short and hard — 10 × (30 s hard / 90 s easy). Stacks on today's Upper A."
        : dow===0 ? "Recovery pace — easy and conversational, fasted morning walk is ideal."
        : lifting ? "Separate session from weights — a fasted morning walk is ideal. Don't tack it onto the end of lifting."
        : "The only session today — easy pace, ideally a fasted morning walk.","",checks.includes("cardio"))}
    </div>`);
  }

  parts.push(mealsCard(meals, checks, `Meals — ${lifting?"training day":"rest day"}`,
    `Phase target: ${TARGETS[pk][lifting?"tr":"re"]}. Protein lands high by design and all fat comes from the food itself — salmon, beef, eggs, yoghurt. No added oils or nuts anywhere.`,
    true,
    `<details><summary>Cooking & notes</summary><div class="inner"><ul>
      <li>Cook without added oil — non-stick pan, air fryer, grill or bake. If you do use any, count it.</li>
      <li>Smoked salmon is already salty — no need to salt that meal.</li>
      <li>Veg with every main meal, salt other food to taste (until event week).</li>
      <li>Rice and sweet potato weights are <b>cooked</b> weights.</li>
      <li>White fish swaps (basa, barramundi, snapper) are fine — keep the amount the same.</li>
    </ul></div></details>`));

  parts.push(`<div class="card">
    <h2><span class="ic">💧</span>Hydration & electrolytes</h2>
    <div class="statgrid">
      <div class="stat"><div class="v">${P.water}</div><div class="k">Water today</div></div>
      <div class="stat"><div class="v">Sodium</div><div class="k">${P.sodium}</div></div>
    </div>
    <div class="note">${P.waterNote} A pinch of salt in water or a low-sugar electrolyte tab on hard or hot days is smart. Feeling flat or fatigued as carbs drop is usually water + electrolytes, not the diet failing. Persistent cramps, dizziness or headaches = add water and salt back, don't push through.</div>
  </div>`);

  parts.push(habitsCard(viewDate, checks, false));

  el.innerHTML = parts.join("");
  bindChecks(el); bindWeigh(el); bindLifts(el); updateMacroCounter();
}

function bindChecks(root){
  root.querySelectorAll("[data-chk]").forEach(n=>{
    n.addEventListener("click",()=>{
      const on = !n.classList.contains("on");
      n.classList.toggle("on",on);
      setCheck(viewDate, n.dataset.chk, on);
      if(n.dataset.chk.startsWith("meal")) updateMacroCounter();
    });
  });
}
function bindWeigh(root){
  const inp = root.querySelector("#wIn"), btn = root.querySelector("#wSave");
  if(!inp||!btn) return;
  const save = ()=>{
    const v = parseFloat(inp.value);
    if(isNaN(v)||v<30||v>250){ inp.style.borderColor="var(--red)"; setTimeout(()=>inp.style.borderColor="",800); return; }
    saveWeight(iso(viewDate), Math.round(v*10)/10);
    renderToday();
  };
  btn.addEventListener("click", e=>{ e.stopPropagation(); save(); });
  inp.addEventListener("keydown", e=>{ if(e.key==="Enter"){ inp.blur(); save(); } });
}

/* ============ BACKUP / RESTORE ============ */
function buildBackupPayload(){
  const data = {};
  Object.keys(localStorage).filter(k=>k.startsWith("p12-")).forEach(k=>data[k]=localStorage.getItem(k));
  return JSON.stringify({app:"PEAK/12", version:1, exported:new Date().toISOString(), data}, null, 1);
}
async function exportBackup(){
  const payload = buildBackupPayload();
  const fname = `peak12-backup-${iso(new Date())}.json`;
  const blob = new Blob([payload], {type:"application/json"});
  let ok = false;
  const file = new File([blob], fname, {type:"application/json"});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], title:"PEAK/12 backup"}); ok = true; }
    catch(e){ ok = false; /* user cancelled the share sheet */ }
  } else {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = fname;
    document.body.appendChild(a); a.click(); a.remove();
    ok = true;
  }
  if(ok){ localStorage.setItem("p12-lastbackup", iso(new Date())); renderWeight(); }
}
function restoreBackup(text){
  let obj;
  try{ obj = JSON.parse(text); }catch(e){ alert("That file isn't a valid backup."); return; }
  if(!obj || obj.app!=="PEAK/12" || !obj.data){ alert("That file isn't a PEAK/12 backup."); return; }
  const when = obj.exported ? new Date(obj.exported).toLocaleString() : "unknown date";
  if(!confirm(`Restore backup from ${when}?\n\nThis replaces everything currently in the app (weigh-ins, ticks, lift logs).`)) return;
  Object.keys(localStorage).filter(k=>k.startsWith("p12-")).forEach(k=>localStorage.removeItem(k));
  Object.entries(obj.data).forEach(([k,v])=>{ if(k.startsWith("p12-")) localStorage.setItem(k, v); });
  alert("Backup restored.");
  location.reload();
}
function backupCardHtml(){
  const lastB = localStorage.getItem("p12-lastbackup");
  return `<div class="card">
    <h2><span class="ic">🗄</span>Backup</h2>
    <div class="sub">Everything — weigh-ins, ticks, lift logs — lives on this phone only. Export a backup file every week or two; Restore brings it all back (or moves it to a new phone).</div>
    <div class="winput" style="margin-top:12px">
      <button id="bkExport" style="flex:1;max-width:none">Export backup</button>
      <button id="bkImport" style="flex:1;max-width:none;background:var(--card2);color:var(--text);border:1px solid var(--line)">Restore</button>
    </div>
    <input type="file" id="bkFile" accept="application/json,.json" style="display:none">
    <div class="targetline">${lastB?`Last backup: ${fmtShort(fromIso(lastB))}`:"No backup yet."}</div>
  </div>`;
}
function bindBackup(root){
  const ex = root.querySelector("#bkExport"), im = root.querySelector("#bkImport"), f = root.querySelector("#bkFile");
  if(!ex) return;
  ex.addEventListener("click", exportBackup);
  im.addEventListener("click", ()=>f.click());
  f.addEventListener("change", e=>{
    const file = e.target.files[0]; if(!file) return;
    const rd = new FileReader();
    rd.onload = ()=>restoreBackup(rd.result);
    rd.readAsText(file);
    e.target.value = "";
  });
}

/* ============ WEIGHT VIEW ============ */
function renderWeight(){
  const el = document.getElementById("weightView");
  const w = getWeights();
  const entries = Object.keys(w).sort().map(k=>({date:k, kg:w[k]})); // chronological

  if(entries.length===0){
    el.innerHTML = `<div class="card">
      <h2><span class="ic">↘</span>Weight log</h2>
      <div class="empty">No entries yet.<br><br>Log your morning weigh-in at the top of the Today tab — every entry lands here automatically.</div>
    </div>` + backupCardHtml();
    bindBackup(el);
    return;
  }

  const latest = entries[entries.length-1];
  const first = entries[0];
  const latestUTC = utc(...latest.date.split("-").map(Number));
  let ago7 = null;
  for(let i=entries.length-2;i>=0;i--){
    if(latestUTC - utc(...entries[i].date.split("-").map(Number)) >= 7*dayMS){ ago7 = entries[i]; break; }
  }
  const fmtD = v => (v>0?"+":"")+v.toFixed(1);
  const cls = v => v<0?"down":(v>0?"up":"flat");
  const total = latest.kg - first.kg;

  /* chart: last 90 entries */
  const pts = entries.slice(-90);
  let chart = "";
  if(pts.length>=2){
    const W=320,H=140,padX=6,padY=14;
    const vals = pts.map(p=>p.kg);
    let lo=Math.min(...vals), hi=Math.max(...vals);
    if(hi-lo<1){ const m=(hi+lo)/2; lo=m-0.5; hi=m+0.5; }
    const x=i=>padX+i*(W-2*padX)/(pts.length-1);
    const y=v=>padY+(hi-v)*(H-2*padY)/(hi-lo);
    const line = pts.map((p,i)=>`${x(i).toFixed(1)},${y(p.kg).toFixed(1)}`).join(" ");
    const dots = pts.length<=31 ? pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.kg).toFixed(1)}" r="2.6" fill="var(--acc)"/>`).join("") : "";
    chart = `<div class="chartbox"><svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      <text x="${padX}" y="10" font-size="9" fill="var(--dim)">${hi.toFixed(1)} kg</text>
      <text x="${padX}" y="${H-3}" font-size="9" fill="var(--dim)">${lo.toFixed(1)} kg</text>
      <polyline points="${line}" fill="none" stroke="var(--acc)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
    </svg></div>`;
  }

  const list = entries.slice().reverse().map((p,ri)=>{
    const i = entries.length-1-ri;
    const prev = i>0 ? entries[i-1].kg : null;
    const d = prev!=null ? p.kg-prev : null;
    return `<div class="wrowline">
      <div class="wd">${fmtShort(fromIso(p.date))}</div>
      <div class="wv">${p.kg.toFixed(1)} kg</div>
      <div class="wdelta ${d!=null?cls(d):"flat"}">${d!=null?fmtD(d):"—"}</div>
      <button class="wdel" data-del="${p.date}" aria-label="Delete entry">✕</button>
    </div>`;
  }).join("");

  el.innerHTML = `
    <div class="card">
      <h2><span class="ic">↘</span>Weight log</h2>
      <div class="wstatgrid">
        <div class="stat"><div class="v">${latest.kg.toFixed(1)} kg</div><div class="k">Latest — ${fmtShort(fromIso(latest.date))}</div></div>
        <div class="stat"><div class="v ${ago7?cls(latest.kg-ago7.kg):"flat"}">${ago7?fmtD(latest.kg-ago7.kg)+" kg":"—"}</div><div class="k">vs ~7 days ago</div></div>
        <div class="stat"><div class="v ${cls(total)}">${fmtD(total)} kg</div><div class="k">Since first entry (${fmtShort(fromIso(first.date))})</div></div>
        <div class="stat"><div class="v">${entries.length}</div><div class="k">Entries</div></div>
      </div>
      ${chart}
      <div class="targetline">Judge the week, not the day — carb cycling bounces the scale day to day. To edit a day's weight, open that day in the Today tab and re-save.</div>
    </div>
    <div class="card">
      <h2><span class="ic">🗓</span>All entries</h2>
      ${list}
    </div>` + backupCardHtml();

  bindBackup(el);
  el.querySelectorAll("[data-del]").forEach(b=>{
    b.addEventListener("click",()=>{
      const d = b.dataset.del;
      if(confirm(`Delete the entry for ${fmtShort(fromIso(d))}?`)){
        saveWeight(d, null); renderWeight();
      }
    });
  });
}

/* ============ PLAN VIEW ============ */

  const idx = dayIndex(now);

  const el = document.getElementById("planView");

  const block = (pk,items)=>`
    <div class="phaseblock${curPk===pk?" active":""}">
      <div class="pt">${PHASES[pk].title}${curPk===pk?'<span class="nowtag">NOW</span>':""}</div>
      <div class="pd">${PHASES[pk].range}</div>

    </div>`;

  el.innerHTML = `
    <div class="card">
      <h2><span class="ic">🗓</span>The program at a glance</h2>
      ${block("p1",[
        "Small deficit — recomposition while holding strength",
        "Lift 4×/week (Upper/Lower ×2) · LISS Tue + Thu + Sunday recovery cardio",
        "Wed & Sat: full rest",
        "Water 3.5–4 L · sodium normal",
        "Deload: week 4 (Mon 3 – Sun 9 Aug)"])}
      ${block("p2",[
        "Calories tighten (~2,450–2,545 training / ~1,825–1,910 rest)",
        "Cardio rises: LISS Tue/Wed/Thu/Sun + HIIT on Monday's Upper A",
        "Water 4–4.5 L · don't under-salt",
        "Deload: week 8 (Mon 31 Aug – Sun 6 Sep)"])}
      ${block("p3",[
        "Final sharpen (~2,270–2,365 training / ~1,735–1,820 rest)",
        "Heaviest cardio week: LISS ×5 (Tue/Wed/Thu/Sat/Sun, 30–35 min) + Monday HIIT",
        "Keep water and sodium consistent — no manipulation yet"])}
      ${block("p4",[
        "Mon–Wed: ~100g carbs + depletion training (Upper A / Lower A / Full Body) — full meals & sessions in the Today view",
        "Thu: carb load ~415g, optional pump only",
        "Fri: ~320g carbs, sodium cut, water taper, low-fibre food, sleep well",
        "Sat 3 Oct: sips of water, small carb feed 2–4 h out, pump 60–90 min out — event day 🏁"])}
    </div>

    <div class="card">
      <h2><span class="ic">🏋️</span>Weekly split (all normal weeks)</h2>
      <table>
        <tr><th>Day</th><th>Session</th></tr>
        <tr><td>Monday</td><td>Upper A — chest/back/shoulders/arms</td></tr>
        <tr><td>Tuesday</td><td>Lower A — quads/hams/glutes/calves</td></tr>
        <tr><td>Wednesday</td><td>Rest <span style="color:var(--dim)">(LISS from Phase 2)</span></td></tr>
        <tr><td>Thursday</td><td>Upper B — chest/back/shoulders/arms</td></tr>
        <tr><td>Friday</td><td>Lower B — quads/hams/glutes/calves</td></tr>
        <tr><td>Saturday</td><td>Rest <span style="color:var(--dim)">(LISS in Phase 3)</span></td></tr>
        <tr><td>Sunday</td><td>Recovery cardio — easy LISS only</td></tr>
      </table>
      <div class="note">Every muscle group twice a week with less gym time — recovery matters more the deeper the cut gets. A and B use different exercises/rep ranges. ${SESSION_NOTE} Compounds 6–10 reps · isolation 10–15 · RPE 8–9 · rest 2–3 min compounds, 60–90 s isolation.</div>
    </div>

    <div class="card">
      <h2><span class="ic">🍽</span>How the meals work</h2>
      <div class="sub" style="color:var(--text)">Meals 1 and 4 are fixed every day. Meals 2 and 3 rotate on a fixed weekly pattern so it's never the same plate two days running — fat comes entirely from the food itself (salmon, beef, eggs, full-fat yoghurt), nothing added on top. Training days (Mon/Tue/Thu/Fri) carry full carbs plus the pre-training meal; rest days (Wed/Sat/Sun) run the lower rest-day amounts with no carb meal. The Today tab always shows the exact grams — zero guessing.</div>
      <table style="margin-top:10px">
        <tr><th>Day</th><th>Meal 2 · Meal 3</th></tr>
        <tr><td>Mon & Fri (train)</td><td style="text-align:left;color:var(--mut)">Chicken · Salmon</td></tr>
        <tr><td>Tue & Thu (train)</td><td style="text-align:left;color:var(--mut)">Beef mince · White fish</td></tr>
        <tr><td>Wed (rest)</td><td style="text-align:left;color:var(--mut)">Chicken · Smoked salmon</td></tr>
        <tr><td>Sat (rest)</td><td style="text-align:left;color:var(--mut)">Beef mince · White fish</td></tr>
        <tr><td>Sun (rest)</td><td style="text-align:left;color:var(--mut)">Beef mince · Salmon (P1) / White fish (P2–3)</td></tr>
      </table>
      <table style="margin-top:12px">
        <tr><th>Fixed</th><th>Base</th></tr>

        <li><b>Photos + waist every Sunday</b> — same time, same lighting.</li>
        <li><b>Deloads in weeks 4 and 8</b> are part of the program, not optional.</li>
        <li>Consistently sore, flat or unmotivated for 3–4+ days = take an extra rest day or bring the deload forward.</li>
      </ul></div>
    </div>

    <div class="banner amber"><b>The one important caution</b>
    Peak week is a few days of smart carb/sodium timing — never near-zero water, diuretics or aggressive dehydration. The extreme version is where people get hurt, and it doesn't even look better. Feeling genuinely unwell = stop, drink, eat, done.</div>

    <div class="proglabel" style="text-align:center;padding:18px 0 4px">Mon 13 July → event day Sat 3 October 2026 · built for one athlete, no fluff</div>
  `;
}

/* ============ NAV / TABS ============ */
function shiftDay(n){ viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth(), viewDate.getDate()+n); renderToday(); }
document.getElementById("prevBtn").addEventListener("click",()=>shiftDay(-1));
document.getElementById("nextBtn").addEventListener("click",()=>shiftDay(1));
document.getElementById("todayBtn").addEventListener("click",()=>{ viewDate = new Date(); renderToday(); });

const tabs = [
  {btn:"tabToday", view:"todayView", nav:true,  render:renderToday},
  {btn:"tabWeight",view:"weightView",nav:false, render:renderWeight},
  {btn:"tabPlan",  view:"planView",  nav:false, render:renderPlan},
];
tabs.forEach(t=>{
  document.getElementById(t.btn).addEventListener("click",()=>{
    tabs.forEach(o=>{
      document.getElementById(o.btn).classList.toggle("active", o===t);
      document.getElementById(o.view).classList.toggle("hide", o!==t);
    });
    document.getElementById("dateNav").style.display = t.nav ? "flex" : "none";
    t.render(); window.scrollTo(0,0);
  });
});

/* refresh when app is reopened on a new day */
document.addEventListener("visibilitychange",()=>{
  if(!document.hidden){ const t=new Date(); if(iso(t)!==iso(viewDate) && iso(viewDate)===localStorage.getItem("p12-lastday")){ viewDate=t; renderToday(); } localStorage.setItem("p12-lastday", iso(t)); }
});
localStorage.setItem("p12-lastday", iso(new Date()));

/* offline: cache the app on-device so it opens with zero signal */
if("serviceWorker" in navigator){ navigator.serviceWorker.register("./sw.js").catch(()=>{}); }

renderToday();
</script>
